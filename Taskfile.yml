version: "3"

vars:
  NODE_VERSION:
    sh: node --version 2>/dev/null || echo "not installed"

tasks:
  default:
    desc: Show available tasks
    silent: true
    cmds:
      - ~/.taskfiles/taskscripts/task-help/task_help.py

  # ---------------------------------------------------------------------------
  # Setup
  # ---------------------------------------------------------------------------

  setup:
    desc: Install all dependencies (including dev)
    cmds:
      - npm install

  setup:ci:
    desc: Install dependencies (clean install, for CI)
    cmds:
      - npm ci

  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------

  build:
    desc: Compile TypeScript to dist/
    cmds:
      - npm run build

  build:watch:
    desc: Watch and recompile on changes
    cmds:
      - npm run watch

  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------

  test:
    desc: Run unit tests (excludes e2e tests requiring API keys)
    cmds:
      - npm run test

  test:all:
    desc: Run all tests including e2e (requires API keys in env)
    cmds:
      - npm run test:all

  test:e2e:
    desc: Run e2e tests (both HTTP and stdio transports) — requires API keys
    cmds:
      - npm run test:e2e

  test:e2e:http:
    desc: Run e2e tests for HTTP transport only — requires API keys
    cmds:
      - npm run test:e2e:http

  test:e2e:stdio:
    desc: Run e2e tests for stdio transport only — requires built dist + API keys
    deps: [build]
    cmds:
      - npm run test:e2e:stdio

  test:watch:
    desc: Run tests in watch mode
    cmds:
      - npm run test:watch

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - npm run test:coverage

  # ---------------------------------------------------------------------------
  # Lint & Format
  # ---------------------------------------------------------------------------

  lint:
    desc: Check formatting with Prettier
    cmds:
      - npm run format:check

  lint:fix:
    desc: Auto-fix formatting with Prettier
    cmds:
      - npm run format

  # ---------------------------------------------------------------------------
  # Dev
  # ---------------------------------------------------------------------------

  dev:stdio:
    desc: Run MCP server in stdio mode (requires BRAVE_API_KEY)
    cmds:
      - node dist/index.js --transport stdio

  dev:http:
    desc: Run MCP server in HTTP mode on port 8080 via Node.js (requires BRAVE_API_KEY)
    cmds:
      - node dist/entrypoints/node.js

  dev:http:bun:
    desc: Run MCP server in HTTP mode on port 8080 via Bun (requires BRAVE_API_KEY + bun installed)
    cmds:
      - bun --hot src/entrypoints/bun.ts

  inspect:
    desc: Open MCP Inspector (stdio transport)
    cmds:
      - npm run inspector

  inspect:http:
    desc: Open MCP Inspector (HTTP transport)
    cmds:
      - npm run inspector:http

  # ---------------------------------------------------------------------------
  # Docker
  # ---------------------------------------------------------------------------

  docker:build:
    desc: Build Node.js Docker image (tag brave-search-mcp-server:node)
    cmds:
      - docker build -t brave-search-mcp-server:node -t brave-search-mcp-server:latest .

  docker:build:bun:
    desc: Build Bun Docker image (tag brave-search-mcp-server:bun)
    cmds:
      - docker build -f Dockerfile.bun -t brave-search-mcp-server:bun .

  docker:build:nc:
    desc: Build Node.js Docker image without cache
    cmds:
      - docker build --no-cache -t brave-search-mcp-server:node .

  docker:build:bun:nc:
    desc: Build Bun Docker image without cache
    cmds:
      - docker build --no-cache -f Dockerfile.bun -t brave-search-mcp-server:bun .

  docker:lint:
    desc: Lint Dockerfiles with hadolint (install with brew install hadolint)
    cmds:
      - hadolint Dockerfile
      - hadolint Dockerfile.bun

  docker:push:
    desc: Push Docker image to registry (set DOCKER_REGISTRY and DOCKER_TAG)
    vars:
      REGISTRY: '{{.DOCKER_REGISTRY | default "ghcr.io/tobiashochguertel"}}'
      TAG: '{{.DOCKER_TAG | default "latest"}}'
    cmds:
      - docker tag brave-search-mcp-server:latest {{.REGISTRY}}/brave-search-mcp-server:{{.TAG}}
      - docker push {{.REGISTRY}}/brave-search-mcp-server:{{.TAG}}

  docker:up:
    desc: Start MCP server via docker-compose (HTTP mode)
    cmds:
      - docker-compose up --build

  docker:down:
    desc: Stop docker-compose services
    cmds:
      - docker-compose down

  docker:logs:
    desc: Tail docker-compose logs
    cmds:
      - docker-compose logs -f

  docker:compose:validate:
    desc: Validate docker-compose.yml syntax
    cmds:
      - docker-compose config --quiet && echo "docker-compose.yml is valid"
      - docker-compose -f docker-compose.benchmark.yml config --quiet && echo "docker-compose.benchmark.yml is valid"

  # ---------------------------------------------------------------------------
  # Benchmark (Node.js vs Bun)
  # ---------------------------------------------------------------------------

  bench:start:
    desc: Start both Node.js and Bun servers via Docker Compose for benchmarking
    cmds:
      - docker compose -f docker-compose.benchmark.yml up --build -d
      - echo "Node.js server → http://localhost:3001/ping"
      - echo "Bun server     → http://localhost:3002/ping"

  bench:stop:
    desc: Stop benchmark Docker Compose services
    cmds:
      - docker compose -f docker-compose.benchmark.yml down

  bench:local:start:node:
    desc: Start Node.js server locally on port 3001 for benchmarking (background)
    env:
      BRAVE_MCP_PORT: "3001"
      BRAVE_MCP_TRANSPORT: "http"
    cmds:
      - node dist/entrypoints/node.js &
      - echo "Node.js server started on http://localhost:3001"

  bench:local:start:bun:
    desc: Start Bun server locally on port 3002 for benchmarking (background)
    env:
      BRAVE_MCP_PORT: "3002"
      BRAVE_MCP_TRANSPORT: "http"
    cmds:
      - bun src/entrypoints/bun.ts &
      - echo "Bun server started on http://localhost:3002"

  bench:local:stop:
    desc: Stop locally-started benchmark servers (kills processes on ports 3001 and 3002)
    cmds:
      - lsof -ti:3001 | xargs kill -9 2>/dev/null || true
      - lsof -ti:3002 | xargs kill -9 2>/dev/null || true
      - echo "Benchmark servers stopped"

  bench:ping:node:
    desc: Benchmark Node.js /ping endpoint with autocannon
    vars:
      NODE_URL: '{{.NODE_URL | default "http://localhost:3001"}}'
    cmds:
      - npx autocannon -c 100 -d 30 -p 10 {{.NODE_URL}}/ping

  bench:ping:bun:
    desc: Benchmark Bun /ping endpoint with autocannon
    vars:
      BUN_URL: '{{.BUN_URL | default "http://localhost:3002"}}'
    cmds:
      - npx autocannon -c 100 -d 30 -p 10 {{.BUN_URL}}/ping

  bench:ping:
    desc: Benchmark both Node.js and Bun /ping endpoints sequentially
    cmds:
      - task: bench:ping:node
      - task: bench:ping:bun

  bench:report:
    desc: Run full benchmark script and generate bench-results.md report
    vars:
      NODE_URL: '{{.NODE_URL | default "http://localhost:3001"}}'
      BUN_URL: '{{.BUN_URL | default "http://localhost:3002"}}'
      BENCH_DURATION: '{{.BENCH_DURATION | default "20"}}'
    env:
      NODE_URL: "{{.NODE_URL}}"
      BUN_URL: "{{.BUN_URL}}"
      BENCH_DURATION: "{{.BENCH_DURATION}}"
    cmds:
      - bun scripts/benchmark.ts

  bench:docker:full:
    desc: Build Docker images, start containers, run full benchmark, stop containers
    cmds:
      - task: docker:build
      - task: docker:build:bun
      - task: bench:start
      - sleep 5
      - task: bench:report
      - task: bench:stop

  bench:local:full:
    desc: Build, start local Node.js+Bun servers, run full benchmark, stop servers
    cmds:
      - task: build
      - task: bench:local:start:node
      - task: bench:local:start:bun
      - sleep 3
      - task: bench:report
      - task: bench:local:stop

  # ---------------------------------------------------------------------------
  # Release
  # ---------------------------------------------------------------------------

  release:check:
    desc: Validate build, tests, formatting and docker before release
    cmds:
      - task: lint
      - task: build
      - task: test
      - task: docker:build
      - task: docker:build:bun

  release:full:
    desc: Full release check including e2e tests (requires API keys)
    cmds:
      - task: lint
      - task: build
      - task: test:all
      - task: docker:build
